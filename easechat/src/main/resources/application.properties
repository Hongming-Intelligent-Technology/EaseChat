spring.application.name=easechat
server.port=8081

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/easechat?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
spring.datasource.username=root
spring.datasource.password=123456

# CORS allowed origins (comma-separated)
cors.allowed-origins=http://localhost:5173

spring.sql.init.mode=never

spring.jpa.hibernate.ddl-auto=none

# MyBatis-Plus
mybatis-plus.type-aliases-package=com.easechat.easechat.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Serve uploaded files from local directory
spring.web.resources.static-locations=classpath:/static/,file:uploads/
